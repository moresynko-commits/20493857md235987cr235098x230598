<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCRPX - Modern Colorado Roleplay</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="App.jsx"></script>
  <style>
    body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #000428 0%, #004e92 100%); }
    h1, h2, h3 { font-family: 'Anton', sans-serif; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .nav-tab { @apply px-6 py-3 rounded-2xl font-medium mx-1 transition-all duration-300 hover:bg-white/10 active:bg-white/20; }
    .nav-tab.active { @apply bg-gradient-to-r from-blue-500 to-purple-600 shadow-xl; }
    .btn-gradient { @apply bg-gradient-to-r from-blue-500 via-purple-600 to-indigo-600 hover:from-blue-600 hover:via-purple-700 hover:to-indigo-700 px-8 py-4 rounded-2xl font-semibold shadow-2xl hover:shadow-glow transform hover:-translate-y-1 transition-all duration-300; }
    @keyframes glow { 0% { box-shadow: 0 0 20px rgba(59,130,246,0.5); } 50% { box-shadow: 0 0 30px rgba(147,51,234,0.8); } 100% { box-shadow: 0 0 20px rgba(59,130,246,0.5); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { createRoot } = ReactDOM;
    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
