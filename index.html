<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCRPX - Modern Colorado Roleplay</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton:wght@400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.2); }
    .glow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    h1 { font-family: 'Anton', sans-serif; }
    * { font-family: 'Montserrat', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); color: white; min-height: 100vh; }
  </style>
</head>
<body class="p-0 m-0">
  <nav class="glass fixed top-0 left-0 right-0 z-50 p-4 flex items-center justify-between shadow-2xl glow">
    <div class="flex items-center space-x-4">
      <img src="https://cdn.discordapp.com/attachments/1486940390081953944/1486940421828509757/MCRPX.png" alt="Logo" class="h-12 w-12 rounded-2xl shadow-xl">
      <h1 class="text-3xl font-normal">MCRPX</h1>
    </div>
    <div class="flex items-center space-x-4">
      <a href="#dashboard" class="px-6 py-3 rounded-2xl bg-slate-800 hover:bg-slate-700 transition-all duration-300 font-medium text-sm">Dashboard</a>
      <a href="#mod" class="px-6 py-3 rounded-2xl bg-slate-800 hover:bg-slate-700 transition-all duration-300 font-medium text-sm">Mod Panel</a>
      <a href="#erlc" class="px-6 py-3 rounded-2xl bg-slate-800 hover:bg-slate-700 transition-all duration-300 font-medium text-sm">ER:LC</a>
      <a href="#apps" class="px-6 py-3 rounded-2xl bg-slate-800 hover:bg-slate-700 transition-all duration-300 font-medium text-sm">Applications</a>
      <button class="px-8 py-3 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 rounded-2xl font-medium shadow-2xl hover:shadow-glow transition-all duration-300 text-sm">
        Connect Discord
      </button>
    </div>
  </nav>

  <main class="pt-24 pb-12 px-6 max-w-7xl mx-auto space-y-12">
    <!-- Dashboard -->
    <section id="dashboard" class="space-y-8">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="glass p-8 rounded-3xl hover:scale-105 transition-all duration-300">
          <h3 class="text-xl mb-4 flex items-center">
            <i class="fas fa-server mr-3 text-blue-400"></i>Server Status
          </h3>
          <div class="flex items-center">
            <div class="w-4 h-4 bg-green-400 rounded-full mr-3 animate-pulse"></div>
            <span class="font-bold text-2xl">247 Online</span>
          </div>
        </div>
        <div class="glass p-8 rounded-3xl hover:scale-105 transition-all duration-300">
          <h3 class="text-xl mb-4 flex items-center">
            <i class="fas fa-ticket-alt mr-3 text-emerald-400"></i>Open Tickets
          </h3>
          <span class="font-bold text-2xl">12</span>
        </div>
        <div class="glass p-8 rounded-3xl hover:scale-105 transition-all duration-300">
          <h3 class="text-xl mb-4 flex items-center">
            <i class="fas fa-gavel mr-3 text-orange-400"></i>Active Calls
          </h3>
          <span class="font-bold text-2xl">4</span>
        </div>
        <div class="glass p-8 rounded-3xl hover:scale-105 transition-all duration-300">
          <h3 class="text-xl mb-4 flex items-center">
            <i class="fas fa-chart-line mr-3 text-purple-400"></i>Staff Activity
          </h3>
          <span class="font-bold text-2xl">89%</span>
        </div>
      </div>
      
      <div class="glass p-8 rounded-3xl">
        <h2 class="text-3xl mb-8">Quick Actions</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
          <button class="action-btn bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700">
            <i class="fas fa-search mr-2"></i>Player Lookup
          </button>
          <button class="action-btn bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700">
            <i class="fas fa-gavel mr-2"></i>New Infraction
          </button>
          <button class="action-btn bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700">
            <i class="fas fa-plus mr-2"></i>New Ticket
          </button>
          <button class="action-btn bg-gradient-to-r from-purple-500 to-pink-600 hover:from-purple-600 hover:to-pink-700">
            <i class="fas fa-gamepad mr-2"></i>ER:LC Command
          </button>
        </div>
      </div>
    </section>

    <!-- More sections: ER:LC lookup, mod panel, profiles, apps, etc. with tables, forms, charts -->
  </main>
</body>
</html>
